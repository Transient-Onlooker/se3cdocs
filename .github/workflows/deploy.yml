name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  repository_dispatch:
    types: [ update_docs ]
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch Data from Google Docs
        run: |
          if [ -z "${{ secrets.GAS_WEBAPP_URL }}" ]; then
            echo "Error: GAS_WEBAPP_URL secret is not set!"
            exit 1
          fi
          curl -L "${{ secrets.GAS_WEBAPP_URL }}" -o public/data.json
          echo "Data fetched successfully"

      - name: Build
        run: npm run build
        env:
          VITE_SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
